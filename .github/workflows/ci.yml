name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_build_validation_dummy_key

  database-tests:
    name: Disposable Supabase integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI_ADMIN_EMAIL: ci-admin@example.test
      CI_ADMIN_STORE_NAME: CI Test Store
      CI_ADMIN_STORE_SLUG: ci-test-store
      CI_ADMIN_WHATSAPP_PHONE: "6280000000000"
      CI_ADMIN_ORIGIN_LABEL: TAJUR HALANG, BOGOR, JAWA BARAT, 16320
      CI_ADMIN_ORIGIN_ADDRESS: Alamat pengujian nonproduksi
      CI_ADMIN_ORIGIN_RAJAONGKIR_ID: "8583"
      CI_ADMIN_ORIGIN_RAJAONGKIR_LEVEL: subdistrict
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520
        with:
          version: "2.109.1"

      - name: Generate CI admin password
        run: echo "CI_ADMIN_PASSWORD=$(openssl rand -base64 24)" >> "$GITHUB_ENV"

      - name: Start disposable Supabase stack
        run: supabase start

      - name: Replay migrations and seed from empty
        run: supabase db reset --local

      - name: Lint database schema
        run: npm run db:lint

      - name: Run Supabase security and performance advisors
        shell: bash
        run: |
          env_file="$RUNNER_TEMP/supabase.env"
          advisor_sql="$RUNNER_TEMP/splinter.sql"
          advisor_csv="$RUNNER_TEMP/supabase-advisors.csv"
          supabase status -o env > "$env_file"
          set -a
          . "$env_file"
          set +a
          rm -f "$env_file"
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/supabase/splinter/b69b4b9e0e32bb04b389edbb95b720f4b634e9ae/splinter.sql" \
            --output "$advisor_sql"
          psql "$DB_URL" --csv --file "$advisor_sql" > "$advisor_csv"
          cat "$advisor_csv"
          if awk -F, 'NR > 1 && $3 ~ /^(ERROR|WARN)$/ && $4 == "EXTERNAL" { found = 1 } END { exit found ? 0 : 1 }' "$advisor_csv"; then
            exit 1
          fi

      - name: Generate database types
        run: npm run db:types

      - name: Verify generated database types are committed
        run: git diff --exit-code -- src/lib/supabase/database.types.ts

      - name: Upload generated database types
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-database-types
          path: src/lib/supabase/database.types.ts

      - name: Dry-run provisioning validation
        shell: bash
        run: |
          env_file="$RUNNER_TEMP/supabase.env"
          supabase status -o env > "$env_file"
          set -a
          . "$env_file"
          set +a
          rm -f "$env_file"
          npx tsx scripts/provision-ci-admin.ts --dry-run

      - name: Provision CI test admin
        shell: bash
        run: |
          env_file="$RUNNER_TEMP/supabase.env"
          supabase status -o env > "$env_file"
          set -a
          . "$env_file"
          set +a
          rm -f "$env_file"
          npx tsx scripts/provision-ci-admin.ts

      - name: Run integration tests
        shell: bash
        run: |
          env_file="$RUNNER_TEMP/supabase.env"
          supabase status -o env > "$env_file"
          set -a
          . "$env_file"
          set +a
          rm -f "$env_file"
          npm run test:integration

      - name: Tear down Supabase stack
        if: always()
        run: supabase stop
